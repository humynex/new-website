<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Three.js Bloom Test</title>
  <style>
    :root {
      --bg: #05070d;
      --primary: #00d4ff;
      --secondary: #6c5ce7;
      --text: #eaf2ff;
      --muted: #7a8aa0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); overflow: hidden; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color("#05070d"); // --bg

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
document.body.appendChild(renderer.domElement);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  0.6,  // strength (LOW = clean)
  0.4,
  0.85
);
composer.addPass(bloom);

// Central glowing torus knot
const knot = new THREE.Mesh(
  new THREE.TorusKnotGeometry(1.2, 0.35, 200, 32),
  new THREE.MeshStandardMaterial({
    color: 0x00ccff,
    emissive: 0x0044aa,
    emissiveIntensity: 2,
    metalness: 1,
    roughness: 0.1,
  })
);
scene.add(knot);

// Shader orb
const orbGeometry = new THREE.SphereGeometry(1.2, 64, 64);

const orbMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform float time;
    varying vec2 vUv;

    void main() {
      float dist = distance(vUv, vec2(0.5));

      // soft glow falloff
      float glow = smoothstep(0.5, 0.2, dist);

      // pulse effect
      float pulse = sin(time * 2.0) * 0.1;

      vec3 color = vec3(0.0, 0.83, 1.0); // clean blue

      gl_FragColor = vec4(color * (glow + pulse), 1.0);
    }
  `,
  transparent: true
});

const orb = new THREE.Mesh(orbGeometry, orbMaterial);
scene.add(orb);

// Ambient particles
const particlesGeometry = new THREE.BufferGeometry();
const particleCount = 400;

const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 25;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particlesMaterial = new THREE.PointsMaterial({
  color: "#00d4ff",
  size: 0.03,
  transparent: true,
  opacity: 0.5
});

const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// Ring
const ringGeometry = new THREE.TorusGeometry(1.8, 0.02, 16, 100);

const ringMaterial = new THREE.MeshBasicMaterial({
  color: "#6c5ce7",
  transparent: true,
  opacity: 0.6
});

const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2;

scene.add(ring);

// Lighting
scene.add(new THREE.AmbientLight(0x111122, 2));
const pt = new THREE.PointLight(0x00ccff, 3, 20);
pt.position.set(0, 3, 3);
scene.add(pt);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Animate
function animate(time) {
  requestAnimationFrame(animate);

  orbMaterial.uniforms.time.value = time * 0.001;

  orb.rotation.y += 0.002;
  ring.rotation.z += 0.003;

  particles.rotation.y += 0.0005;

  composer.render();
}
animate();
</script>
</body>
</html>
